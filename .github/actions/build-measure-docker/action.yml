name: Build measure Docker image
description: Build the measure utility Docker image for the supported platforms.

inputs:
  push:
    description: Whether to push the built image.
    required: false
    default: "false"
  tags:
    description: Docker image tags to apply.
    required: false
    default: ""
  labels:
    description: Docker image labels to apply.
    required: false
    default: ""
  target:
    description: Dockerfile target to build (runtime or ha-app).
    required: false
    default: "runtime"
  platforms:
    description: Comma-separated target platforms.
    required: false
    default: "linux/amd64,linux/arm64"

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
    - name: Build Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: ./utils/measure
        platforms: ${{ inputs.platforms }}
        target: ${{ inputs.target }}
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
