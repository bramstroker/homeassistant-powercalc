name: Build measure Docker image
description: Build the measure utility Docker image for the supported platforms.

inputs:
  push:
    description: Whether to push the built image.
    required: false
    default: "false"
  tags:
    description: Docker image tags to apply.
    required: false
    default: ""
  labels:
    description: Docker image labels to apply.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
    - name: Build Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: ./utils/measure
        platforms: linux/amd64,linux/arm64
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
