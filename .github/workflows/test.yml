name: Test

on:
  workflow_dispatch:
  push:
    paths:
      - '**.py'
  pull_request:
    paths:
      - '**.py'
      - 'uv.lock'

permissions:
  contents: read

jobs:
  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Install dependencies
        run: uv sync --group dev
      - name: Prepare test env
        run: bash tests/setup.sh
      - name: Run release draft engine tests
        run: uv run pytest .github/scripts/release_draft/tests -qq
      - name: Run tests
        run: |
          uv run pytest \
            -qq \
            --timeout=9 \
            --durations=10 \
            --cov custom_components.powercalc \
            --cov-report xml \
            -o console_output_style=count \
            -p no:sugar \
            tests
          uv run coverage lcov
      - name: Upload Coverage Results
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
        with:
          github-token: ${{ secrets.github_token }}
          path-to-lcov: coverage.lcov
