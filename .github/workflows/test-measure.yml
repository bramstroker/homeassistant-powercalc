name: Test measure util

on:
  workflow_dispatch:
  push:
    paths:
      - 'utils/measure/**'
  pull_request:
    paths:
      - 'utils/measure/**'

permissions:
  contents: read

jobs:
  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          working-directory: './utils/measure'
          python-version: '3.13'
      - name: Run tests
        run: |
          cd ./utils/measure && uv run --extra dev pytest \
            -qq \
            --durations=10 \
            -o console_output_style=count \
            -p no:sugar \
            tests
