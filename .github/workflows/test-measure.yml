name: Test measure util

on:
  workflow_dispatch:
  push:
    paths:
      - 'utils/measure/**'
      - '.github/actions/build-measure-docker/**'
      - '.github/workflows/test-measure.yml'
  pull_request:
    paths:
      - 'utils/measure/**'
      - '.github/actions/build-measure-docker/**'
      - '.github/workflows/test-measure.yml'

permissions:
  contents: read

jobs:
  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          working-directory: './utils/measure'
          python-version: '3.14'
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Run tests
        run: |
          cd ./utils/measure
          uv run --extra dev ruff check measure tests
          MYPYPATH=. uv run --extra dev mypy \
            --explicit-package-bases \
            --follow-imports=silent \
            --ignore-missing-imports \
            --config-file ../../pyproject.toml \
            measure/request.py \
            measure/tuning.py \
            measure/assembler.py \
            measure/execution.py \
            measure/model.py \
            measure/home_assistant.py \
            measure/home_assistant_entities.py \
            measure/cli/interaction.py \
            measure/cli/main.py \
            measure/cli/measurements.py \
            measure/cli/questions.py \
            measure/controller/charging/spec.py \
            measure/controller/light/capabilities.py \
            measure/controller/light/hass.py \
            measure/runner/light_plan.py \
            measure/runner/light.py \
            measure/runner/speaker.py \
            measure/runner/fan.py \
            measure/runner/charging.py \
            measure/ha_app/interaction.py \
            measure/ha_app/session.py \
            measure/ha_app/storage.py \
            measure/ha_app/coordinator.py \
            measure/ha_app/service.py \
            measure/ha_app/preflight.py \
            measure/ha_app/api.py \
            measure/ha_app/main.py
          uv run --extra dev pytest \
            -qq \
            --durations=10 \
            -o console_output_style=count \
            -p no:sugar \
            tests

  docker:
    runs-on: "ubuntu-latest"
    name: Build Docker image
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Build Docker image
        uses: ./.github/actions/build-measure-docker

  home-assistant-app:
    runs-on: "ubuntu-latest"
    name: Validate Home Assistant app
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Validate repository and app metadata
        run: ruby utils/measure/home-assistant-app/validate.rb
      - name: Run Home Assistant app linter
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: ./utils/measure/home-assistant-app/powercalc_measure
      - name: Build Home Assistant app image
        uses: ./.github/actions/build-measure-docker
        with:
          target: ha-app
