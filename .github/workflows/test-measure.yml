name: Test measure util

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'utils/measure/**'
      - '.github/actions/build-measure-docker/**'
      - '.github/workflows/test-measure.yml'
  pull_request:
    paths:
      - 'utils/measure/**'
      - '.github/actions/build-measure-docker/**'
      - '.github/workflows/test-measure.yml'

permissions:
  contents: read

jobs:
  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: '0.11.31'
          working-directory: './utils/measure'
          python-version: '3.14'
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Run tests
        run: |
          cd ./utils/measure
          uv run --extra dev --extra app --extra cli ruff check measure tests prepare_app_release.py
          MYPYPATH=. uv run --extra dev --extra app --extra cli mypy \
            --strict \
            --explicit-package-bases \
            --follow-imports=silent \
            --ignore-missing-imports \
            --config-file ../../pyproject.toml \
            prepare_app_release.py \
            measure
          uv run --extra dev --extra app --extra cli pytest \
            -qq \
            --durations=10 \
            -o console_output_style=count \
            -p no:sugar \
            tests
          uv run --extra dev --group visualize pytest -q tests/test_visualization_renderer.py

  docker:
    runs-on: "ubuntu-latest"
    name: Build Docker image
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Build Docker image
        uses: ./.github/actions/build-measure-docker

  home-assistant-app:
    runs-on: "ubuntu-latest"
    name: Validate Home Assistant app
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Validate repository and app metadata
        run: ruby utils/measure/home-assistant-app/validate.rb
      - name: Run Home Assistant app linter
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: ./utils/measure/home-assistant-app/powercalc_measure
      - name: Build Home Assistant app image
        uses: ./.github/actions/build-measure-docker
        with:
          target: ha-app
