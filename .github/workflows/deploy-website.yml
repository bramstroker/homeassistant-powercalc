name: Deploy website

on:
  push:
    branches:
      - master
    paths:
      - website/**
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-website
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Configure SSH
        env:
          WEBSITE_SSH_KEY: ${{ secrets.WEBSITE_SSH_KEY }}
          WEBSITE_SSH_KNOWN_HOSTS: ${{ secrets.WEBSITE_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          if [ -z "${WEBSITE_SSH_KEY}" ]; then
            echo "Missing WEBSITE_SSH_KEY secret" >&2
            exit 1
          fi

          if [ -z "${WEBSITE_SSH_KNOWN_HOSTS}" ]; then
            echo "Missing WEBSITE_SSH_KNOWN_HOSTS secret" >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${WEBSITE_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${WEBSITE_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy with rsync
        env:
          WEBSITE_SSH_HOST: ${{ secrets.WEBSITE_SSH_HOST }}
          WEBSITE_SSH_PORT: ${{ secrets.WEBSITE_SSH_PORT || '22' }}
          WEBSITE_SSH_USER: ${{ secrets.WEBSITE_SSH_USER }}
          WEBSITE_DEPLOY_PATH: ${{ secrets.WEBSITE_DEPLOY_PATH }}
          WEBSITE_RSYNC_USE_SUDO: ${{ secrets.WEBSITE_RSYNC_USE_SUDO || 'false' }}
        run: |
          set -euo pipefail

          for variable in WEBSITE_SSH_HOST WEBSITE_SSH_PORT WEBSITE_SSH_USER WEBSITE_DEPLOY_PATH WEBSITE_RSYNC_USE_SUDO; do
            if [ -z "${!variable}" ]; then
              echo "Missing ${variable} secret" >&2
              exit 1
            fi
          done

          if [ "${WEBSITE_RSYNC_USE_SUDO}" != "true" ] && [ "${WEBSITE_RSYNC_USE_SUDO}" != "false" ]; then
            echo "WEBSITE_RSYNC_USE_SUDO must be either 'true' or 'false'" >&2
            exit 1
          fi

          remote_path="$(printf '%q' "${WEBSITE_DEPLOY_PATH}")"
          ssh_options=(
            -i ~/.ssh/deploy_key
            -p "${WEBSITE_SSH_PORT}"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
          )
          rsync_options=(
            -az
            --delete
            --itemize-changes
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r
            -e "ssh -i ~/.ssh/deploy_key -p ${WEBSITE_SSH_PORT} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          )

          if [ "${WEBSITE_RSYNC_USE_SUDO}" = "true" ]; then
            ssh "${ssh_options[@]}" "${WEBSITE_SSH_USER}@${WEBSITE_SSH_HOST}" "sudo mkdir -p ${remote_path}"
            rsync_options+=(--rsync-path="sudo rsync")
          else
            ssh "${ssh_options[@]}" "${WEBSITE_SSH_USER}@${WEBSITE_SSH_HOST}" "mkdir -p ${remote_path}"
            ssh "${ssh_options[@]}" "${WEBSITE_SSH_USER}@${WEBSITE_SSH_HOST}" "test -w ${remote_path}" || {
              echo "Deploy path is not writable by ${WEBSITE_SSH_USER}: ${WEBSITE_DEPLOY_PATH}" >&2
              echo "Remote permission diagnostics:" >&2
              ssh "${ssh_options[@]}" "${WEBSITE_SSH_USER}@${WEBSITE_SSH_HOST}" \
                "whoami; id; stat -c '%A %U %G %n' ${remote_path}; touch ${remote_path}/.deploy-write-test && rm ${remote_path}/.deploy-write-test" >&2 || true
              echo "Fix by chowning the deploy path to ${WEBSITE_SSH_USER}, or set WEBSITE_RSYNC_USE_SUDO=true and allow passwordless sudo for rsync/mkdir." >&2
              exit 1
            }
          fi

          rsync "${rsync_options[@]}" \
            website/ \
            "${WEBSITE_SSH_USER}@${WEBSITE_SSH_HOST}:${WEBSITE_DEPLOY_PATH}/"
