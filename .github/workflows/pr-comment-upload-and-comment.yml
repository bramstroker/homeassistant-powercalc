name: Comment with PR plots

on:
  workflow_run:
    workflows: [Generate PR plots]
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Generate PR plots run ID to download artifacts from.
        required: true
      pr_number:
        description: Pull request number to comment on.
        required: true

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  upload:
    name: Upload plots to Imgur
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        id: download-artifact
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: plots
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.run_id || github.event.workflow_run.id }}
      - name: Checkout comment action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        if: github.event_name == 'workflow_dispatch' && steps.download-artifact.outcome != 'success'
        with:
          working-directory: './utils/visualize'
      - name: Download PR measurement files
        if: github.event_name == 'workflow_dispatch' && steps.download-artifact.outcome != 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const prNumber = Number(process.env.PR_NUMBER);
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const measurementFiles = files.filter(file => {
              return /(brightness|color_temp|hs|effect)\.csv\.gz$/.test(file.filename);
            });
            if (!measurementFiles.length) {
              throw new Error(`No measurement CSV files found for PR ${prNumber}`);
            }
            fs.mkdirSync('artifacts', { recursive: true });
            for (const file of measurementFiles) {
              const response = await fetch(file.raw_url);
              if (!response.ok) {
                throw new Error(`Unable to download ${file.filename}: ${response.status} ${response.statusText}`);
              }
              const target = path.join('manual-pr-files', file.filename);
              fs.mkdirSync(path.dirname(target), { recursive: true });
              fs.writeFileSync(target, Buffer.from(await response.arrayBuffer()));
            }
            fs.writeFileSync('manual-pr-files/changed_files.txt', measurementFiles.map(file => file.filename).join('\n'));
      - name: Generate plots from PR files
        if: github.event_name == 'workflow_dispatch' && steps.download-artifact.outcome != 'success'
        run: |
          cd ./utils/visualize
          while IFS= read -r file; do
            echo "Generating plot for - ${file}."
            uv run python plot.py "${{ github.workspace }}/manual-pr-files/${file}" --output=auto
          done < "${{ github.workspace }}/manual-pr-files/changed_files.txt"
          cp ./*.png "${{ github.workspace }}/artifacts/"
      - name: Read PR number
        id: pr
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          if [ -n "${PR_NUMBER}" ]; then
            echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "number=$(cat artifacts/pr_number.txt)" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload the plots to Imgur
        uses: devicons/public-upload-to-imgur@b774d640a6703b5ce1deef66e7789409c217f3b2 # v2
        id: imgur_step
        with:
          path: ./artifacts/**/*.png
          client_id: ${{secrets.IMGUR_CLIENT_ID}}
      - name: Build PR message
        id: build-pr-message
        run: |
          {
            echo 'PR_MESSAGE<<EOF'
            echo "Thank you for submitting light measurements!"
            echo -e "Here are some visualizations for the CSV files.\n"
          } >> "$GITHUB_OUTPUT"
          for url in ${{ join(fromJSON(steps.imgur_step.outputs.imgur_urls), ' ') }}
          do
            echo "![Image](${url})" >> "$GITHUB_OUTPUT"
          done
          echo 'EOF' >> "$GITHUB_OUTPUT"
      - name: Post Comment on PR
        uses: ./.github/actions/upsert-pr-comment
        with:
          pr-number: ${{ steps.pr.outputs.number }}
          body: ${{ steps.build-pr-message.outputs.PR_MESSAGE }}
          match-text: Thank you for submitting
