name: Comment with PR plots

on:
  workflow_run:
    workflows: [Generate PR plots]
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Generate PR plots run ID to download artifacts from.
        required: true
      pr_number:
        description: Pull request number to comment on.
        required: true

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  upload:
    name: Upload plots to Imgur
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout comment action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Find plots artifact
        id: artifact
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RUN_ID: ${{ github.event.inputs.run_id || github.event.workflow_run.id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runId = Number(process.env.RUN_ID)
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            })
            core.setOutput('exists', data.artifacts.some((artifact) => artifact.name === 'plots') ? 'true' : 'false')
      - name: Download Artifact
        if: steps.artifact.outputs.exists == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: plots
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.run_id || github.event.workflow_run.id }}
      - name: Read PR number
        if: steps.artifact.outputs.exists == 'true'
        id: pr
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          if [ -n "${PR_NUMBER}" ]; then
            pr_number="${PR_NUMBER}"
          else
            pr_number="$(tr -d '[:space:]' < artifacts/pr_number.txt)"
          fi
          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"
      - name: Upload the plots to Imgur
        if: steps.artifact.outputs.exists == 'true'
        uses: devicons/public-upload-to-imgur@b774d640a6703b5ce1deef66e7789409c217f3b2 # v2
        id: imgur_step
        with:
          path: ./artifacts/**/*.png
          client_id: ${{secrets.IMGUR_CLIENT_ID}}
      - name: Build PR message
        if: steps.artifact.outputs.exists == 'true'
        id: build-pr-message
        run: |
          {
            echo 'PR_MESSAGE<<EOF'
            echo "Thank you for submitting Powercalc measurements!"
            echo -e "Here are visualizations of the contributed profile data.\n"
          } >> "$GITHUB_OUTPUT"
          for url in ${{ join(fromJSON(steps.imgur_step.outputs.imgur_urls), ' ') }}
          do
            echo "![Image](${url})" >> "$GITHUB_OUTPUT"
          done
          echo 'EOF' >> "$GITHUB_OUTPUT"
      - name: Post Comment on PR
        if: steps.artifact.outputs.exists == 'true'
        uses: ./.github/actions/upsert-pr-comment
        with:
          pr-number: ${{ steps.pr.outputs.number }}
          body: ${{ steps.build-pr-message.outputs.PR_MESSAGE }}
          match-text: Thank you for submitting
