name: Draft Integration Release

on:
  push:
    branches:
      - master
      - beta

permissions:
  contents: write
  pull-requests: read

jobs:
  update_release_draft:
    name: Update release draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.14'
      # Measure changelog entries are collected separately by the Measure
      # Release workflow: a published measure-v* release here would be picked
      # up by HACS as a Powercalc integration version.
      #
      # Pushes to master update the stable draft (vX.Y.Z); pushes to beta update
      # a separate prerelease draft (vX.Y.Z-beta.N). The supporters footer is
      # generated in-process by the script.
      - name: Update integration release draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CHANNEL: ${{ github.ref_name == 'beta' && 'beta' || 'stable' }}
          HEAD_REF: ${{ github.ref_name }}
        run: python .github/scripts/release_draft/update_integration_draft.py
