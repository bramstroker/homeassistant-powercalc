name: Release Drafter

on:
  push:
    branches:
      - master
      - beta

permissions:
  contents: write
  pull-requests: read

jobs:
  update_release_draft:
    name: Update release draft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Generate Release Drafter config with supporters
        id: supporters
        env:
          BMC_API_TOKEN: ${{ secrets.BMC_API_TOKEN }}
          BMC_SLUG: ${{ secrets.BMC_SLUG }}
        run: |
          set -eu
          section="$(python .github/scripts/generate_supporters_section.py)"

          # Store multiline output safely
          {
            echo "value<<EOF"
            echo "$section"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      # Measure changelog entries are collected separately by the Measure
      # Release workflow: a published measure-v* release here would be picked
      # up by HACS as a Powercalc integration version.
      - name: Update integration release draft
        uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7
        with:
          footer: ${{ steps.supporters.outputs.value }}
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
