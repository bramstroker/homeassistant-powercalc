name: Generate PR plots

on:
  pull_request:
    paths:
      - 'profile_library/**/*.csv.gz'
      - 'profile_library/**/model.json'

permissions:
  contents: read

jobs:
  generate-plots:
    name: Generate plots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: '0.11.30'
          working-directory: './utils/measure'
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        name: List changed files from the PR
        id: list-files
        with:
          script: |
            const { execSync } = require('child_process')
            const fs = require('fs')
            const { base, head } = context.payload.pull_request
            const rawFiles = execSync(`git diff --name-only ${base.sha} ${head.sha}`).toString()
            const files = rawFiles.split('\n').filter((file) => {
              if (/^profile_library\/.+\/(brightness|color_temp|hs|effect)\.csv\.gz$/.test(file)) return true
              if (!/^profile_library\/.+\/model\.json$/.test(file) || !fs.existsSync(file)) return false
              try {
                const model = JSON.parse(fs.readFileSync(file, 'utf8'))
                return model.calculation_strategy === 'linear' && Array.isArray(model.linear_config?.calibrate)
              } catch {
                return false
              }
            })
            core.setOutput('changedFiles', files.join('\n'))
            core.setOutput('hasPlots', files.length ? 'true' : 'false')
      - name: Run visualization tool
        if: steps.list-files.outputs.hasPlots == 'true'
        run: |
          mkdir -p plot-artifacts
          while IFS= read -r file; do
            if [ -z "${file}" ]; then
              continue
            fi
            echo "Generating plot for - ${file}."
            if [ -f "${{ github.workspace }}/${file}" ]; then
              relative="${file#profile_library/}"
              if [[ "${relative}" == */model.json ]]; then
                output="plot-artifacts/${relative%model.json}calibration.png"
              else
                output="plot-artifacts/${relative%.csv.gz}.png"
              fi
              uv --project utils/measure run --group visualize powercalc-visualize \
                "${{ github.workspace }}/${file}" --output="${output}"
            else
              echo "::error::Changed file is missing from checkout: ${file}"
              exit 1
            fi
          done <<< "${STEPS_LIST_FILES_OUTPUTS_CHANGEDFILES}"
        env:
          STEPS_LIST_FILES_OUTPUTS_CHANGEDFILES: ${{ steps.list-files.outputs.changedFiles }}
      - name: Verify plots generated
        if: steps.list-files.outputs.hasPlots == 'true'
        run: |
          if ! find plot-artifacts -type f -name '*.png' -print -quit | grep -q .; then
            echo "::error::No plot PNG files were generated"
            exit 1
          fi
      - name: Write PR number
        if: steps.list-files.outputs.hasPlots == 'true'
        run: |
          echo "${{ github.event.pull_request.number }}" > plot-artifacts/pr_number.txt
      - name: Upload Artifact
        if: steps.list-files.outputs.hasPlots == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: plots
          if-no-files-found: error
          path: plot-artifacts
