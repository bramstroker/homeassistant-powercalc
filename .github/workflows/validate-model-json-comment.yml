name: Comment on model.json validation

on:
  workflow_run:
    workflows: [Validate model.json]
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Validate model.json run ID to download artifacts from.
        required: true
      pr_number:
        description: Pull request number to comment on.
        required: true

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  comment:
    name: Comment on model.json validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout comment action
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Download validation result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: model-json-validation
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.inputs.run_id || github.event.workflow_run.id }}
      - name: Read validation result
        id: validation-result
        run: |
          status="$(tr -d '[:space:]' < artifacts/model_json_validation_status.txt)"
          if [ "${status}" != "success" ] && [ "${status}" != "failure" ]; then
            echo "Unexpected validation status: ${status}" >&2
            exit 1
          fi
          echo "status=${status}" >> "$GITHUB_OUTPUT"
      - name: Read PR number
        id: pr
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          if [ -n "${PR_NUMBER}" ]; then
            pr_number="${PR_NUMBER}"
          else
            pr_number="$(tr -d '[:space:]' < artifacts/pr_number.txt)"
          fi
          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"
      - name: Ensure validation report exists
        if: steps.validation-result.outputs.status == 'failure'
        run: |
          if [ ! -s artifacts/model_json_validation_report.md ]; then
            {
              echo "<!-- model.json validate action comment -->"
              echo
              echo "The model.json validation workflow failed before it could write a detailed report."
            } > artifacts/model_json_validation_report.md
          fi
      - name: Create or update validation comment
        if: steps.validation-result.outputs.status == 'failure'
        uses: ./.github/actions/upsert-pr-comment
        with:
          pr-number: ${{ steps.pr.outputs.number }}
          body-file: artifacts/model_json_validation_report.md
          match-text: |
            <!-- model.json validate action comment -->
            **JSON Schema validation failed
      - name: Clear validation comment
        if: steps.validation-result.outputs.status == 'success'
        uses: ./.github/actions/upsert-pr-comment
        with:
          pr-number: ${{ steps.pr.outputs.number }}
          state: absent
          match-text: |
            <!-- model.json validate action comment -->
            **JSON Schema validation failed
