name: Publish Measure Docker Image

on:
  push:
    branches:
      - 'master'
    paths:
      - 'utils/measure/**'
      - '.github/actions/build-measure-docker/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_cli_image:
        description: Also build and publish the standalone measure CLI image
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  docker:
    if: github.event_name != 'workflow_dispatch' || inputs.publish_cli_image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Get version
        id: version
        uses: home-assistant/actions/helpers/version@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master
      - if: github.event.action == 'published'
        name: Write version file
        run: 'echo "${STEPS_VERSION_OUTPUTS_VERSION}:docker" > utils/measure/.VERSION'
        env:
          STEPS_VERSION_OUTPUTS_VERSION: ${{ steps.version.outputs.version }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            ghcr.io/bramstroker/measure
            bramgerritsen/powercalc-measure
          flavor: |
            latest=auto
          # generate Docker tags based on the following events/attributes
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: ./.github/actions/build-measure-docker
        with:
          push: "true"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  home-assistant-app:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.app.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Validate app metadata
        run: ruby utils/measure/home-assistant-app/validate.rb
      - name: Run Home Assistant app linter
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: ./utils/measure/home-assistant-app/powercalc_measure
      - name: Read app version
        id: app
        run: |
          version=$(ruby -ryaml -e 'puts YAML.safe_load(File.read(ARGV.fetch(0))).fetch("version")' utils/measure/home-assistant-app/powercalc_measure/config.yaml)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/bramstroker/powercalc-measure-app
          tags: |
            type=raw,value=${{ steps.app.outputs.version }}
          # Required on Home Assistant app images that are not built with the
          # official builder action.
          labels: |
            io.hass.version=${{ steps.app.outputs.version }}
            io.hass.type=app
            io.hass.arch=aarch64|amd64
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Home Assistant app
        uses: ./.github/actions/build-measure-docker
        with:
          target: ha-app
          push: "true"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Mirrors home-assistant-app/ to the dedicated app-store repository. Runs
  # after the image push so the store never references a tag that is not yet
  # pullable. Requires the APPS_REPO_TOKEN secret: a fine-grained PAT with
  # contents read/write on bramstroker/powercalc-measure-app.
  publish-app-repository:
    if: github.repository == 'bramstroker/homeassistant-powercalc'
    needs: home-assistant-app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Checkout app repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: bramstroker/powercalc-measure-app
          token: ${{ secrets.APPS_REPO_TOKEN }}
          path: apps-repo
          persist-credentials: false
      - name: Sync app metadata
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.DS_Store' \
            --exclude 'validate.rb' \
            utils/measure/home-assistant-app/ apps-repo/
      - name: Commit and push
        working-directory: apps-repo
        env:
          VERSION: ${{ needs.home-assistant-app.outputs.version }}
          APPS_REPO_TOKEN: ${{ secrets.APPS_REPO_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "App repository is already up to date"
          else
            git commit -m "Powercalc Measure ${VERSION}"
            # The token is supplied only for this push instead of being
            # persisted in .git/config by actions/checkout.
            git push "https://x-access-token:${APPS_REPO_TOKEN}@github.com/bramstroker/powercalc-measure-app.git" HEAD
          fi
