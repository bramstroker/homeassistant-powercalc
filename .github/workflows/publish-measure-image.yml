name: Publish Measure Docker Image

on:
  push:
    branches:
      - 'master'
    paths:
      - 'utils/measure/**'
      - '.github/actions/build-measure-docker/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_cli_image:
        description: Also build and publish the standalone measure CLI image
        type: boolean
        default: false

permissions:
  contents: read

env:
  APP_ARCHITECTURES: '["amd64", "aarch64"]'
  APP_IMAGE_NAME: powercalc-measure-app

jobs:
  docker:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'measure-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_cli_image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Read measure version
        if: github.event_name != 'push'
        id: measure
        run: |
          version=$(ruby -ryaml -e 'puts YAML.safe_load(File.read(ARGV.fetch(0))).fetch("version")' utils/measure/home-assistant-app/powercalc_measure/config.yaml)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Validate release tag
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ steps.measure.outputs.version }}
        run: |
          expected_tag="measure-v${VERSION}"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match measure version ${VERSION}" >&2
            exit 1
          fi
      - name: Write CLI version file
        if: github.event_name != 'push'
        run: 'echo "v${VERSION}:cli" > utils/measure/.VERSION'
        env:
          VERSION: ${{ steps.measure.outputs.version }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            ghcr.io/bramstroker/measure
            bramgerritsen/powercalc-measure
          flavor: |
            latest=auto
          # generate Docker tags based on the following events/attributes
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value=v${{ steps.measure.outputs.version }},enable=${{ github.event_name != 'push' }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.measure.outputs.version }},enable=${{ github.event_name != 'push' }}
            type=semver,pattern={{major}},value=v${{ steps.measure.outputs.version }},enable=${{ github.event_name != 'push' }}
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: ./.github/actions/build-measure-docker
        with:
          push: "true"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  home-assistant-app-init:
    name: Initialize Home Assistant app build
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'measure-v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.app.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Validate app metadata
        run: ruby utils/measure/home-assistant-app/validate.rb
      - name: Run Home Assistant app linter
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: ./utils/measure/home-assistant-app/powercalc_measure
      - name: Read app version
        id: app
        run: |
          version=$(ruby -ryaml -e 'puts YAML.safe_load(File.read(ARGV.fetch(0))).fetch("version")' utils/measure/home-assistant-app/powercalc_measure/config.yaml)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Validate release tag
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          VERSION: ${{ steps.app.outputs.version }}
        run: |
          expected_tag="measure-v${VERSION}"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match app version ${VERSION}" >&2
            exit 1
          fi
      - name: Prepare architecture matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          architectures: ${{ env.APP_ARCHITECTURES }}
          image-name: ${{ env.APP_IMAGE_NAME }}

  home-assistant-app-build:
    name: Build Home Assistant app (${{ matrix.arch }})
    if: needs.home-assistant-app-init.result == 'success'
    needs: home-assistant-app-init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.home-assistant-app-init.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Write app version file
        run: 'echo "v${APP_VERSION}:app" > utils/measure/.VERSION'
        env:
          APP_VERSION: ${{ needs.home-assistant-app-init.outputs.version }}
      - name: Build, publish and sign architecture image
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          arch: ${{ matrix.arch }}
          build-args: |
            FINAL_STAGE=ha-app
          cache-gha-scope: powercalc-measure-app
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./utils/measure
          cosign: "true"
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.home-assistant-app-init.outputs.version }}
            latest
          labels: |
            io.hass.type=app
          push: "true"
          version: ${{ needs.home-assistant-app-init.outputs.version }}

  home-assistant-app-manifest:
    name: Publish signed Home Assistant app manifest
    needs:
      - home-assistant-app-init
      - home-assistant-app-build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish and sign multi-architecture manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@4de35182ce1e329181bffcbcc84d33db5e2c7e10 # 2026.06.0
        with:
          architectures: ${{ env.APP_ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          cosign: "true"
          image-name: ${{ env.APP_IMAGE_NAME }}
          image-tags: |
            ${{ needs.home-assistant-app-init.outputs.version }}
            latest

  # Mirrors home-assistant-app/ to the dedicated app-store repository. Runs
  # after the image push so the store never references a tag that is not yet
  # pullable. Requires the APPS_REPO_TOKEN secret: a fine-grained PAT with
  # contents read/write on bramstroker/powercalc-measure-app.
  publish-app-repository:
    if: github.repository == 'bramstroker/homeassistant-powercalc'
    needs:
      - home-assistant-app-init
      - home-assistant-app-manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Checkout app repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: bramstroker/powercalc-measure-app
          token: ${{ secrets.APPS_REPO_TOKEN }}
          path: apps-repo
          persist-credentials: false
      - name: Sync app metadata
        run: |
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.DS_Store' \
            --exclude 'validate.rb' \
            utils/measure/home-assistant-app/ apps-repo/
      - name: Commit and push
        working-directory: apps-repo
        env:
          VERSION: ${{ needs.home-assistant-app-init.outputs.version }}
          APPS_REPO_TOKEN: ${{ secrets.APPS_REPO_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "App repository is already up to date"
          else
            git commit -m "Powercalc Measure ${VERSION}"
            # The token is supplied only for this push instead of being
            # persisted in .git/config by actions/checkout.
            git push "https://x-access-token:${APPS_REPO_TOKEN}@github.com/bramstroker/powercalc-measure-app.git" HEAD
          fi
