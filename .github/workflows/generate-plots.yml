name: Generate plots

on:
  push:
    paths:
      - '**/*.csv.gz'
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    name: Generate plots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          working-directory: './utils/visualize'
      - name: Run visualization tool
        run: bash ./utils/visualize/generate-all.sh ./profile_library
      - uses: EndBug/add-and-commit@v10
        if: github.ref == 'refs/heads/master'
        with:
          message: 'chore: generate plots'
          pull: '--rebase --autostash'
