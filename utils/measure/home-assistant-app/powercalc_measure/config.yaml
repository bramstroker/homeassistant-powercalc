name: Powercalc Measure
version: "0.1.0"
slug: powercalc_measure
description: Create Powercalc power profiles from Home Assistant entities
url: https://docs.powercalc.nl/contributing/measure/home-assistant-app/
arch:
  - aarch64
  - amd64
image: ghcr.io/bramstroker/powercalc-measure-app
stage: experimental
ingress: true
ingress_stream: true
panel_icon: mdi:chart-bell-curve-cumulative
homeassistant_api: true
environment:
  MEASURE_TRUSTED_INGRESS_ONLY: "true"
# The Supervisor queries /health from 172.30.32.2, so the ingress source
# check lets it through. A restart aborts an active measurement session,
# which is preferable to leaving a hung app running unattended.
watchdog: http://[HOST]:[PORT:8099]/health
backup: cold
options:
  debug_logging: false
schema:
  debug_logging: bool
